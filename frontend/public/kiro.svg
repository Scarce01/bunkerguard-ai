<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" shape-rendering="geometricPrecision">
  <!-- Purple rounded-square background, matching the Kiro app icon -->
  <defs>
    <linearGradient id="kiroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5BFF"/>
      <stop offset="1" stop-color="#7A3BFF"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="96" height="96" rx="20" ry="20" fill="url(#kiroBg)"/>

  <!-- Kiro ghost — white, smooth dome head, single soft bump on bottom-left
       and a swooping tail on bottom-right, matching the reference picture. -->
  <path fill="#FFFFFF"
    d="
      M 34 22
      C 26 22  19 30  19 41
      L 19 69
      C 19 72.5  22  74  24.5 72
      L 27.5 69.5
      C 29.5 67.5  31.5 67.5  33.5 69.5
      L 36 72
      C 38 74  40 74  42 72
      L 44 70
      C 45.5 68.5  47.5 68.5  49 70
      L 53 74
      C 56 76.5  60 76  63.5 73
      L 73 65
      C 76 62  77 58.5  77 54
      L 77 41
      C 77 30  70 22  62 22
      Z
    "/>

  <!-- Eyes — two round black dots, slightly oval like the reference -->
  <ellipse cx="38" cy="46" rx="3.5" ry="4.6" fill="#0D0E1F"/>
  <ellipse cx="58" cy="46" rx="3.5" ry="4.6" fill="#0D0E1F"/>
</svg>
